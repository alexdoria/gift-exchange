{% extends 'base.html' %}
{% block profile %}
<div>
    <h3>{{ request.user.first_name }}'s gifts</h3>
</div>
{% endblock profile %}

{% load static %}
{% block content %}
    <div class="uk-child-width-1-3 uk-grid-match" uk-grid>
        {% for g in gifts %}
        <div>
        <div class="uk-card uk-card-default">
            <div class="uk-card-media-top">
                <img src="{% static 'img/landscape_mockup.png' %}">
            </div>
            <div class="uk-card-body">
                <h3 class="uk-card-title"><i class="fa-solid fa-gift"></i> {{ g.shortname }}</h3>
                <p>{{ g.description }}</p>
                {% for group in g.groups %}
                <span class="uk-badge">{{ group }}</span>
                {% endfor %}
            </div>
        </div>
        </div>
        {% endfor %}
    </div>
{% endblock content %}
